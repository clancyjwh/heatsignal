<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heatsignal | FX Fund Management Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🔥</span>
                <span class="logo-text">HEATSIGNAL</span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li class="active" data-section="analysis">
                        <span class="icon">📊</span>
                        <span class="label">Analysis</span>
                    </li>
                    <li data-section="balancing">
                        <span class="icon">⚖️</span>
                        <span class="label">Balancing</span>
                    </li>
                    <li data-section="rfq">
                        <span class="icon">📩</span>
                        <span class="label">RFQ</span>
                    </li>
                    <li data-section="pricing">
                        <span class="icon">🔍</span>
                        <span class="label">Find prices</span>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="pulse"></span>
                    Live Market Feed
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header class="top-bar">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="asset-search" placeholder="Search 105 FX pairs...">
                </div>
                <div class="market-overview">
                    <div class="global-sentiment">
                        Global Sentiment: <span class="sentiment-value positive">+2.4</span>
                    </div>
                </div>
            </header>

            <section class="dashboard-section" id="analysis-section">
                <div class="section-header">
                    <h1>Market Analysis</h1>
                    <div class="controls">
                        <select id="sort-control">
                            <option value="score-desc">Highest Score</option>
                            <option value="score-asc">Lowest Score</option>
                            <option value="name">Alphabetical</option>
                        </select>
                    </div>
                </div>

                <div class="asset-grid" id="asset-grid">
                    <!-- Assets will be injected here by JS -->
                    <div class="loading">Loading 105 FX pairs...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
