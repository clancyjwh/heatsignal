<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heatsignal | FX Fund Management Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🔥</span>
                <span class="logo-text">HEATSIGNAL</span>
            </div>
            <nav class="main-nav">
                <ul>
                    <li class="active" data-section="analysis">
                        <span class="icon">📊</span>
                        <span class="label">Analysis</span>
                    </li>
                    <li data-section="balancing">
                        <span class="icon">⚖️</span>
                        <span class="label">Balancing</span>
                    </li>
                    <li data-section="rfq">
                        <span class="icon">📩</span>
                        <span class="label">RFQ</span>
                    </li>
                    <li data-section="pricing">
                        <span class="icon">🔍</span>
                        <span class="label">Find prices</span>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="pulse"></span>
                    Live Market Feed
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header class="dashboard-header">
                <h1 class="page-title" id="page-title">Market Analysis</h1>

                <div class="search-container" id="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="asset-search" placeholder="Search 105 FX pairs...">
                </div>

                <div class="header-controls" id="header-controls">
                    <select id="sort-control">
                        <option value="score-desc">Highest Score</option>
                        <option value="score-asc">Lowest Score</option>
                        <option value="name">Alphabetical</option>
                    </select>
                </div>

                <div class="global-sentiment" id="global-sentiment">
                    Sentiment: <span class="sentiment-value positive">+2.4</span>
                </div>
            </header>

            <section class="dashboard-section" id="analysis-section">
                <div class="asset-grid" id="asset-grid">
                    <!-- Assets will be injected here by JS -->
                    <div class="loading">Loading 105 FX pairs...</div>
                </div>
            </section>

            <section class="dashboard-section" id="balancing-section" style="display: none;">
                <div class="balancing-container">
                    <div class="upload-area" id="upload-area">
                        <div class="upload-icon">📁</div>
                        <h3>Upload Excel for Balancing</h3>
                        <p>Drag & drop or click to select Excel sheet</p>
                        <input type="file" id="file-input" accept=".xlsx, .xls" style="display: none;">
                        <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">Select File</button>
                    </div>

                    <div id="balancing-results-container" style="display: none;">
                        <div class="results-header">
                            <h2>Balancing Results</h2>
                            <button class="btn btn-secondary" onclick="location.reload()">Clear Results</button>
                        </div>
                        <div class="spreadsheet-container">
                            <table id="balancing-table">
                                <thead id="balancing-thead"></thead>
                                <tbody id="balancing-tbody"></tbody>
                                <tfoot id="balancing-tfoot"></tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body">
                <!-- Data will be injected here -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
